<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stream Receiver</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif;
  }

  #video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
    z-index: 1;
  }

  #status {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #eee;
    text-align: center;
    gap: 16px;
    transition: opacity 0.4s ease;
    padding: 0 5%;
    box-sizing: border-box;
    z-index: 5;
  }

  #status .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 1.4s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  #status .url {
    font-family: monospace;
    font-size: 1rem;
    color: #8fd3ff;
  }

  #fullscreen-btn {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    color: #fff;
    border: none;
    font-size: 1.5rem;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
  }

  #sound-btn {
    position: fixed;
    left: 5%;
    bottom: 5%;
    background: rgba(0,0,0,0.75);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.4);
    font-size: 1rem;
    padding: 12px 20px;
    border-radius: 999px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 15;
  }

  #sound-btn:focus {
    outline: 3px solid #4caf50;
    outline-offset: 2px;
  }

  #stats {
    position: fixed;
    top: 5%;
    right: 5%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-family: monospace;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    line-height: 1.6;
    white-space: pre;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 10;
  }

  #stats.visible {
    opacity: 1;
  }

  #pair-btn {
    position: fixed;
    top: 5%;
    left: 5%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.4);
    font-size: 0.9rem;
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    z-index: 8;
  }

  #pair-btn:focus {
    outline: 3px solid #4caf50;
    outline-offset: 2px;
  }

  #pair-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    padding: 5%;
    box-sizing: border-box;
    color: #eee;
    font-family: -apple-system, system-ui, sans-serif;
    text-align: center;
  }

  #pair-overlay.visible {
    display: flex;
  }

  #pair-overlay h2 {
    font-size: 1.2rem;
    margin: 0 0 12px;
  }

  #pair-video {
    width: min(320px, 80vw);
    height: min(320px, 80vw);
    background: #111;
    border-radius: 8px;
    object-fit: cover;
    display: none;
  }

  #pair-video.visible {
    display: block;
  }

  #pair-scan-btn {
    margin-top: 12px;
  }

  #pair-manual {
    margin-top: 20px;
    width: min(420px, 90vw);
  }

  #pair-input {
    width: 100%;
    min-height: 44px;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #555;
    padding: 8px 12px;
    box-sizing: border-box;
    background: #1e1e22;
    color: #eee;
  }

  #pair-error {
    color: #ff6b6b;
    font-size: 0.85rem;
    margin-top: 8px;
    min-height: 1.2em;
  }

  #pair-overlay button {
    min-height: 44px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #2d7ef7;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }

  #pair-close-btn {
    background: transparent !important;
    color: #999 !important;
    font-weight: 400 !important;
  }
</style>
</head>
<body>
  <div id="status">
    <div class="dot"></div>
    <div id="status-text">Waiting for stream…</div>
    <div class="url" id="status-url"></div>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <button id="fullscreen-btn">Tap to go fullscreen</button>
  <button id="sound-btn">🔇 Tap for sound</button>
  <button id="pair-btn">Pair with sender</button>
  <div id="stats"></div>

  <!-- Serverless pairing mode: connect directly to a phone hosting itself (e.g. the
       iOS sender), instead of going through server.js's Socket.io relay. See
       ios-sender/ and the "Automatic quality fallback"-style docs in README.md. -->
  <div id="pair-overlay">
    <h2>Pair with a sender</h2>
    <video id="pair-video" muted playsinline></video>
    <button id="pair-scan-btn" style="display:none">Scan QR code</button>
    <div id="pair-manual">
      <input type="text" id="pair-input" placeholder="http://192.168.1.x:PORT/offer?sid=..." />
      <div id="pair-error"></div>
      <button id="pair-connect-btn">Connect</button>
    </div>
    <button id="pair-close-btn">Cancel</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/auth.js"></script>
  <script>
    const ROOM = 'stream';
    const socket = createAuthenticatedSocket();
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const statusUrl = document.getElementById('status-url');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const soundBtn = document.getElementById('sound-btn');
    const statsEl = document.getElementById('stats');
    const pairBtn = document.getElementById('pair-btn');
    const pairOverlay = document.getElementById('pair-overlay');
    const pairVideo = document.getElementById('pair-video');
    const pairScanBtn = document.getElementById('pair-scan-btn');
    const pairInput = document.getElementById('pair-input');
    const pairError = document.getElementById('pair-error');
    const pairConnectBtn = document.getElementById('pair-connect-btn');
    const pairCloseBtn = document.getElementById('pair-close-btn');

    statusUrl.textContent = window.location.protocol + '//' + window.location.host;

    let pc = null;
    let statsInterval = null;
    let statsVisible = false;
    let hideTimeout = null;
    let prevFrames = 0;
    let prevFrameTime = 0;
    let prevDropped = 0;
    let reconnecting = false;

    function createPeerConnection() {
      pc = new RTCPeerConnection({ iceServers: [] });

      pc.ontrack = (event) => {
        video.srcObject = event.streams[0];
        setStatus('connected');
        attemptFullscreen();
        attemptUnmutedPlayback();
        scheduleHideStatus();

        // A small extra playout buffer absorbs network jitter without dropping frames —
        // trades ~100ms of latency (irrelevant for screen mirroring) for smoother motion.
        if ('playoutDelayHint' in event.receiver) {
          event.receiver.playoutDelayHint = 0.1;
        }
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', event.candidate);
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connecting') {
          setStatus('connecting');
        } else if (pc.connectionState === 'connected') {
          setStatus('connected');
        } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
          handleDisconnect();
        }
      };
    }

    function setStatus(state) {
      if (state === 'waiting') {
        statusText.textContent = 'Waiting for stream…';
        statusEl.style.opacity = '1';
        statusEl.style.pointerEvents = 'auto';
      } else if (state === 'connecting') {
        statusText.textContent = 'Connecting…';
        statusEl.style.opacity = '1';
        statusEl.style.pointerEvents = 'auto';
      } else if (state === 'connected') {
        statusText.textContent = '';
      } else if (state === 'disconnected') {
        statusText.textContent = 'Stream ended — reconnecting…';
        statusEl.style.opacity = '1';
        statusEl.style.pointerEvents = 'auto';
      }
    }

    function scheduleHideStatus() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        statusEl.style.opacity = '0';
        statusEl.style.pointerEvents = 'none';
      }, 3000);
    }

    function attemptFullscreen() {
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {
          fullscreenBtn.style.display = 'flex';
        });
      }
    }

    fullscreenBtn.addEventListener('click', () => {
      document.documentElement.requestFullscreen().catch(() => {});
      fullscreenBtn.style.display = 'none';
      // Any click is a user gesture — piggyback the unmute attempt on it too.
      unmute();
    });

    // The <video> starts muted so autoplay is never blocked (the browser policy that
    // blocks unmuted autoplay is why tab/system audio can look "silently dropped" —
    // it isn't dropped, it's just muted at the sink). Try unmuted playback once a
    // stream arrives; if the browser blocks it, fall back to muted + a visible button
    // so a real user gesture (touch or D-pad OK) can unmute it.
    async function attemptUnmutedPlayback() {
      video.muted = false;
      try {
        await video.play();
        soundBtn.style.display = 'none';
      } catch (e) {
        video.muted = true;
        video.play().catch(() => {});
        soundBtn.style.display = 'flex';
      }
    }

    function unmute() {
      video.muted = false;
      video.play().catch(() => {});
      soundBtn.style.display = 'none';
    }

    soundBtn.addEventListener('click', unmute);

    function handleDisconnect() {
      if (reconnecting) return;
      reconnecting = true;
      setStatus('disconnected');
      clearInterval(statsInterval);
      setTimeout(() => {
        window.location.reload();
      }, 3000);
    }

    function joinRoom() {
      socket.emit('join', { room: ROOM, role: 'receiver' });
    }

    socket.on('connect', () => {
      joinRoom();
      setStatus('waiting');
    });

    socket.on('connect_error', (err) => {
      if (err && err.message === 'Incorrect password') return;
      statusText.textContent = 'Cannot reach server — is it running?';
      statusEl.style.opacity = '1';
    });

    socket.on('join-rejected', (data) => {
      statusText.textContent = data.reason || 'Could not join — room already in use';
      statusEl.style.opacity = '1';
      statusEl.style.pointerEvents = 'auto';
    });

    socket.on('offer', async (offer) => {
      setStatus('connecting');
      if (!pc) createPeerConnection();
      await pc.setRemoteDescription(offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', answer);
      startStatsPolling();
    });

    socket.on('ice-candidate', async (candidate) => {
      if (pc) {
        try {
          await pc.addIceCandidate(candidate);
        } catch (e) {
          console.warn('Error adding ICE candidate:', e);
        }
      }
    });

    socket.on('peer-disconnected', () => {
      handleDisconnect();
    });

    function startStatsPolling() {
      clearInterval(statsInterval);
      prevFrames = 0;
      prevDropped = 0;
      prevFrameTime = performance.now();
      statsInterval = setInterval(updateStats, 1000);
    }

    async function updateStats() {
      if (!pc) return;

      const width = video.videoWidth || 0;
      const height = video.videoHeight || 0;

      let fps = 0;
      let droppedDelta = 0;
      if (video.getVideoPlaybackQuality) {
        const quality = video.getVideoPlaybackQuality();
        const now = performance.now();
        const frameDelta = quality.totalVideoFrames - prevFrames;
        const timeDelta = (now - prevFrameTime) / 1000;
        fps = timeDelta > 0 ? Math.round(frameDelta / timeDelta) : 0;
        droppedDelta = quality.droppedVideoFrames - prevDropped;
        prevFrames = quality.totalVideoFrames;
        prevDropped = quality.droppedVideoFrames;
        prevFrameTime = now;
      }

      let bufferHealth = 0;
      if (video.buffered.length > 0) {
        bufferHealth = (video.buffered.end(video.buffered.length - 1) - video.currentTime).toFixed(2);
      }

      // Dropped frames here mean the device's decoder can't keep up with the incoming
      // stream — a strong signal that this TV, not the sender or network, is the bottleneck.
      let codecName = '–';
      const rtcStats = await pc.getStats();
      rtcStats.forEach(report => {
        if (report.type === 'inbound-rtp' && report.kind === 'video' && report.codecId) {
          const codecReport = rtcStats.get(report.codecId);
          if (codecReport) codecName = codecReport.mimeType.replace('video/', '');
        }
      });

      const connectionState = pc.connectionState;

      statsEl.textContent =
        `${width}x${height}\n` +
        `${fps} fps\n` +
        `dropped ${droppedDelta}/s\n` +
        `buffer ${bufferHealth}s\n` +
        `${codecName}\n` +
        `${connectionState}`;

      // Feeds the sender's auto quality fallback — dropped frames climbing here means
      // this device's decoder can't keep up, which the sender has no way to see on its own.
      socket.emit('receiver-quality', { droppedPerSec: droppedDelta });
    }

    // --- Serverless pairing mode ---------------------------------------------------
    // Connect directly to a self-hosted sender (e.g. ios-sender/) via a one-shot
    // GET-offer/POST-answer exchange, bypassing server.js's Socket.io relay
    // entirely for this connection's signaling. Fully additive — reuses
    // createPeerConnection()/setStatus()/startStatsPolling() unchanged; the only
    // new thing is *how* the offer/answer get exchanged.

    let pairScanning = false;
    let pairStream = null;
    let barcodeDetector = null;

    function openPairOverlay() {
      pairOverlay.classList.add('visible');
      pairError.textContent = '';
      pairInput.focus();
      if ('BarcodeDetector' in window) {
        pairScanBtn.style.display = 'inline-block';
      }
    }

    function closePairOverlay() {
      pairOverlay.classList.remove('visible');
      stopScanning();
    }

    pairBtn.addEventListener('click', openPairOverlay);
    pairCloseBtn.addEventListener('click', closePairOverlay);

    async function startScanning() {
      if (pairScanning) return;
      try {
        barcodeDetector = barcodeDetector || new BarcodeDetector({ formats: ['qr_code'] });
        pairStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        pairVideo.srcObject = pairStream;
        pairVideo.classList.add('visible');
        await pairVideo.play();
        pairScanning = true;
        pairScanBtn.textContent = 'Stop scanning';
        scanLoop();
      } catch (e) {
        pairError.textContent = 'Camera unavailable — enter the pairing URL manually below.';
      }
    }

    function stopScanning() {
      pairScanning = false;
      pairScanBtn.textContent = 'Scan QR code';
      pairVideo.classList.remove('visible');
      if (pairStream) {
        pairStream.getTracks().forEach(t => t.stop());
        pairStream = null;
      }
    }

    pairScanBtn.addEventListener('click', () => {
      if (pairScanning) stopScanning();
      else startScanning();
    });

    async function scanLoop() {
      if (!pairScanning) return;
      try {
        const codes = await barcodeDetector.detect(pairVideo);
        if (codes.length > 0 && codes[0].rawValue) {
          stopScanning();
          closePairOverlay();
          connectViaPairing(codes[0].rawValue);
          return;
        }
      } catch (e) {
        // Detection can transiently fail (e.g. video not ready yet) — keep trying.
      }
      requestAnimationFrame(scanLoop);
    }

    pairConnectBtn.addEventListener('click', () => {
      const url = pairInput.value.trim();
      if (!url) return;
      closePairOverlay();
      connectViaPairing(url);
    });

    pairInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') pairConnectBtn.click();
    });

    function waitForIceGatheringComplete(peerConnection) {
      if (peerConnection.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise((resolve) => {
        function check() {
          if (peerConnection.iceGatheringState === 'complete') {
            peerConnection.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        }
        peerConnection.addEventListener('icegatheringstatechange', check);
        // Defensive timeout matching the sender side's 3s safety net — not expected
        // to trigger under normal iceServers:[] LAN gathering.
        setTimeout(() => {
          peerConnection.removeEventListener('icegatheringstatechange', check);
          resolve();
        }, 3000);
      });
    }

    async function connectViaPairing(offerUrl) {
      setStatus('connecting');
      reconnecting = false;

      if (pc) {
        pc.close();
        pc = null;
      }
      createPeerConnection();

      try {
        const offerResp = await fetch(offerUrl);
        if (!offerResp.ok) throw new Error(`Could not fetch offer (${offerResp.status})`);
        const offerPayload = await offerResp.json();

        await pc.setRemoteDescription({ type: offerPayload.type, sdp: offerPayload.sdp });
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        // Non-trickle on this side too — the sender has no ongoing signaling
        // channel to receive candidates on after this one POST, so wait for full
        // local ICE gathering and embed everything in the single answer we send.
        await waitForIceGatheringComplete(pc);

        const answerUrl = offerUrl.replace('/offer', '/answer');
        const answerResp = await fetch(answerUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'answer', sdp: pc.localDescription.sdp })
        });
        if (!answerResp.ok) throw new Error(`Sender rejected answer (${answerResp.status})`);

        startStatsPolling();
      } catch (e) {
        console.error('Pairing connection failed:', e);
        setStatus('waiting');
        statusText.textContent = 'Could not connect to sender — check the pairing URL and try again.';
        statusEl.style.opacity = '1';
        statusEl.style.pointerEvents = 'auto';
      }
    }

    document.addEventListener('keydown', () => {
      statsVisible = !statsVisible;
      statsEl.classList.toggle('visible', statsVisible);
    });

    createPeerConnection();
  </script>
</body>
</html>
