name: ScreenMirrorSender
options:
  bundleIdPrefix: com.streamapp
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

packages:
  StreamWebRTC:
    url: https://github.com/GetStream/stream-video-swift-webrtc.git
    exactVersion: 148.0.0

targets:
  ScreenMirrorSender:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: ScreenMirrorSender
      - path: Shared
    info:
      path: Generated/ScreenMirrorSender-Info.plist
      properties:
        CFBundleDisplayName: "Screen Mirror"
        # XcodeGen's default Info.plist template hardcodes a literal "1" here
        # rather than the $(CURRENT_PROJECT_VERSION) placeholder — setting the
        # build setting alone does nothing without this explicit override.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocalNetworkUsageDescription: "Used to advertise this device on your local network so a receiver can find and pair with it."
        NSBonjourServices:
          - "_screenmirror._tcp"
        NSMicrophoneUsageDescription: "This app does not record your microphone. iOS requires this description because the audio session used to mix system audio into the stream is configured with a category that supports microphone input."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Generated/ScreenMirrorSender.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.streamapp.screenmirror
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamapp.iossender
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: D8QV4PC9XM
        # CFBundleVersion was static ("1") on every build. iOS's broadcast-extension
        # registry appears to cache the extension by bundle ID + version, so a
        # reinstalled app with an unchanged version can keep running the OLD
        # extension binary even though the containing app itself is genuinely
        # fresh — confirmed by two separate fixes (button init frame, diagnostic
        # logging) neither taking effect despite successful reinstalls + a device
        # restart. Bump this on every real device test from now on.
        CURRENT_PROJECT_VERSION: 1784273289
    dependencies:
      - target: ScreenMirrorBroadcastExtension
        embed: true
      - package: StreamWebRTC

  ScreenMirrorBroadcastExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: ScreenMirrorBroadcastExtension
      - path: Shared
    info:
      path: Generated/ScreenMirrorBroadcastExtension-Info.plist
      properties:
        CFBundleDisplayName: "Screen Mirror"
        # See ScreenMirrorSender target's matching comment.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
        NSLocalNetworkUsageDescription: "Used to advertise this device on your local network so a receiver can find and pair with it."
        # Required by iOS even though the mic picker toggle is off (showsMicrophoneButton
        # = false) and no mic audio is actually captured — confirmed via a device crash
        # (TCC namespace, "attempted to access privacy-sensitive data without a usage
        # description... NSMicrophoneUsageDescription"). The custom audio device's
        # AVAudioSession category configuration alone triggers this check.
        NSMicrophoneUsageDescription: "This app does not record your microphone. iOS requires this description because the audio session used to mix system audio into the stream is configured with a category that supports microphone input."
        NSBonjourServices:
          - "_screenmirror._tcp"
        # Needed for the temporary debug-log POST to the dev Mac's plain-HTTP
        # server (App Transport Security blocks arbitrary HTTP by default).
        # NSAllowsLocalNetworking is the narrow exception — LAN only, not a
        # blanket arbitrary-loads bypass.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Generated/ScreenMirrorBroadcastExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.streamapp.screenmirror
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamapp.iossender.broadcast
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        SKIP_INSTALL: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: D8QV4PC9XM
        # See ScreenMirrorSender target's matching comment — must bump together.
        CURRENT_PROJECT_VERSION: 1784273289
    dependencies:
      - package: StreamWebRTC

schemes:
  ScreenMirrorSender:
    build:
      targets:
        ScreenMirrorSender: all
        ScreenMirrorBroadcastExtension: all
    run:
      config: Debug
      # Without this, XcodeGen defaults the scheme's Launch Action to whichever
      # target it picks first — which came out as the .appex, not the .app, and
      # made Run try to launch the extension directly (hence the "choose a host
      # app" dialog). Explicitly point it at the actual app.
      executable: ScreenMirrorSender
    archive:
      config: Release
